<title>Silje vs. det periodiske system</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);min-height:100vh;min-height:100dvh;color:#f1f5f9}
#root{min-height:100vh;min-height:100dvh}
@keyframes fw1{0%{transform:translateY(0) scale(1);opacity:1}50%{opacity:1}100%{transform:translateY(-200px) scale(0);opacity:0}}
@keyframes fw2{0%{transform:scale(0);opacity:0}30%{transform:scale(1.2);opacity:1}100%{transform:scale(0.8);opacity:0}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.firework{position:absolute;width:8px;height:8px;border-radius:50%;animation:fw1 1.5s ease-out infinite}
.burst{position:absolute;width:120px;height:120px;border-radius:50%;border:3px solid;animation:fw2 2s ease-out infinite}
.spark{position:absolute;width:4px;height:4px;border-radius:50%;animation:sparkle 1.2s ease-in-out infinite}

<script>
const el=React.createElement,{useState,useRef}=React;

const elements=[
{symbol:"H",name:"Hydrogen",no:1,year:"1766",by:"Henry Cavendish",named:"Fra gresk 'hydro' (vann) + 'genes' (skaper) – altså 'vannskaper'.",facts:["Hydrogen er det letteste og mest tallrike grunnstoffet i universet – det utgjør ca. 75 % av all vanlig materie.","Solen drives av fusjon av hydrogen til helium. Hvert sekund omdannes 600 millioner tonn hydrogen.","Hydrogen ble brukt i luftskip som Hindenburg – helt til det tok fyr i 1937."]},
{symbol:"He",name:"Helium",no:2,year:"1868",by:"Pierre Janssen & Joseph Norman Lockyer",named:"Oppkalt etter den greske solguden Helios, fordi det først ble oppdaget i sollyset.",facts:["Helium ble oppdaget i sollyset under en solformørkelse – før det ble funnet på jorden.","Det er det eneste grunnstoffet som ikke kan fryses til fast form ved vanlig trykk.","Helium er en ikke-fornybar ressurs på jorden – når det slippes ut, forsvinner det til verdensrommet for alltid."]},
{symbol:"Li",name:"Litium",no:3,year:"1817",by:"Johan August Arfwedson",named:"Fra gresk 'lithos' (stein), fordi det ble funnet i et mineral.",facts:["Litium er det letteste metallet – det flyter på vann (og reagerer med det!).","Det brukes i batterier i nesten alle smarttelefoner og elbiler.","Litiumforbindelser brukes også som stemningsstabiliserende medisin mot bipolar lidelse."]},
{symbol:"Be",name:"Beryllium",no:4,year:"1798",by:"Louis Nicolas Vauquelin",named:"Oppkalt etter mineralet beryll, fra gresk 'beryllos' (en grønn edelsten).",facts:["Beryllium er ekstremt lett og stivt, og brukes i romfart og satellitter.","Smaragder får sin grønne farge fra spor av krom i berylliummineralet beryll.","James Webb-romteleskopets speil er laget av gullbelagt beryllium."]},
{symbol:"B",name:"Bor",no:5,year:"1808",by:"Humphry Davy, Gay-Lussac & Thénard",named:"Fra arabisk 'buraq' eller persisk 'burah', gamle navn for boraks.",facts:["Bor er essensielt for plantevekst, men giftig for planter i store mengder.","Boraks har vært brukt som rengjøringsmiddel i over 4000 år.","Bornitrid, en borforbindelse, er nesten like hardt som diamant."]},
{symbol:"C",name:"Karbon",no:6,year:"Kjent siden oldtiden",by:"Ukjent",named:"Fra latin 'carbo' som betyr kull eller trekull.",facts:["Karbon er grunnlaget for alt kjent liv og kan danne flere forbindelser enn noe annet grunnstoff.","Diamant og grafitt er begge rent karbon – bare atomene er ordnet forskjellig.","Et enkelt gram karbon i form av grafén kan dekke en hel fotballbane – det er bare ett atom tykt."]},
{symbol:"N",name:"Nitrogen",no:7,year:"1772",by:"Daniel Rutherford",named:"Fra gresk 'nitron' (salpeter) + 'genes' (skaper).",facts:["Nitrogen utgjør 78 % av luften vi puster inn.","Flytende nitrogen brukes til å fryse alt fra vorter til iskrem på sekunder (–196 °C).","TNT, nitroglyserin og de fleste sprengstoff er nitrogenforbindelser."]},
{symbol:"O",name:"Oksygen",no:8,year:"1774",by:"Joseph Priestley & Carl Wilhelm Scheele",named:"Fra gresk 'oxys' (syre) + 'genes' (skaper) – man trodde oksygen var i alle syrer.",facts:["Oksygen utgjør ca. 21 % av atmosfæren og 65 % av kroppsvekten din (mest i vann).","Flytende oksygen er lyseblått og svakt magnetisk!","Uten oksygen ville himmelen vært svart selv midt på dagen – det er oksygen som sprer blått lys."]},
{symbol:"F",name:"Fluor",no:9,year:"1886",by:"Henri Moissan",named:"Fra latin 'fluere' (å flyte), fordi flusspat ble brukt som smeltehjelp.",facts:["Fluor er det mest reaktive av alle grunnstoffer – det reagerer med nesten alt, inkludert glass.","Det brukes i tannkrem (fluorid) for å styrke tannemaljen.","Flere kjemikere ble skadet eller døde i forsøk på å isolere fluor før Moissan lyktes."]},
{symbol:"Ne",name:"Neon",no:10,year:"1898",by:"William Ramsay & Morris Travers",named:"Fra gresk 'neos' som betyr 'ny'.",facts:["Ekte neonskilt lyser rødoransje. Andre farger bruker andre gasser.","Neon er ekstremt sjeldent i jordatmosfæren – bare 0,0018 %.","Neon leder elektrisitet og lyser selv ved svært lave spenninger – perfekt for skilt."]},
{symbol:"Na",name:"Natrium",no:11,year:"1807",by:"Humphry Davy",named:"Symbolet Na fra latin 'natrium', fra egyptisk 'natron' (soda).",facts:["Rent natrium eksploderer i kontakt med vann!","Natriumdamp gir gatebelysning den karakteristiske gule fargen.","Humphry Davy danset rundt i laboratoriet av glede da han først isolerte natrium ved elektrolyse."]},
{symbol:"Mg",name:"Magnesium",no:12,year:"1755",by:"Joseph Black",named:"Oppkalt etter Magnesia, et distrikt i Thessalia, Hellas.",facts:["Magnesium brenner med et intenst hvitt lys og var tidlig brukt i fotografiblits.","Det er det åttende mest tallrike grunnstoffet i jordskorpen.","Klorofyll – molekylet som gjør planter grønne – har et magnesiumatom i sentrum."]},
{symbol:"Al",name:"Aluminium",no:13,year:"1825",by:"Hans Christian Ørsted",named:"Fra latin 'alumen' (alun), et salt kjent siden antikken.",facts:["Aluminium var en gang dyrere enn gull! Napoleon III serverte æresgjester med aluminiumsbestikk.","Det er det vanligste metallet i jordskorpen.","Aluminiumsfolie har en blank og en matt side – det er bare fordi to ark valses samtidig."]},
{symbol:"Si",name:"Silisium",no:14,year:"1824",by:"Jöns Jacob Berzelius",named:"Fra latin 'silex' (flint/kiselstein).",facts:["Silisium er grunnlaget for all moderne elektronikk – derav navnet 'Silicon Valley'.","Det er det nest vanligste grunnstoffet i jordskorpen etter oksygen.","Glass er hovedsakelig silisiumdioksid – teknisk sett lages datamaskiner av sand!"]},
{symbol:"P",name:"Fosfor",no:15,year:"1669",by:"Hennig Brand",named:"Fra gresk 'phosphoros' som betyr 'lysbærer'.",facts:["Fosfor ble oppdaget ved å koke ned store mengder urin – av en alkymist som lette etter gull!","Hvitt fosfor lyser i mørket (fosforescens) og er ekstremt giftig.","DNA-molekylet ditt har en fosfor-sukker-ryggrad – uten fosfor, intet liv."]},
{symbol:"S",name:"Svovel",no:16,year:"Kjent siden oldtiden",by:"Ukjent",named:"Fra sanskrit 'sulvere' eller latin 'sulpur'. Kalles 'brimstone' på engelsk.",facts:["Svovel ble kalt 'brimstone' og assosiert med helvete på grunn av lukten.","Vulkanske områder som på Island og Io (Jupiters måne) har store forekomster av svovel.","Svovel er essensielt i to av de 20 aminosyrene kroppen din bruker til å bygge proteiner."]},
{symbol:"Cl",name:"Klor",no:17,year:"1774",by:"Carl Wilhelm Scheele",named:"Fra gresk 'chloros' som betyr 'gulgrønn', etter fargen på gassen.",facts:["Klor brukes til å rense drikkevann – en av de viktigste oppdagelsene for folkehelse.","I ren form er klor en giftig, gulgrønn gass med stikkende lukt.","Bordsalt (NaCl) er halvparten klor – et av de giftigste grunnstoffene i et av de tryggeste stoffene!"]},
{symbol:"Ar",name:"Argon",no:18,year:"1894",by:"Lord Rayleigh & William Ramsay",named:"Fra gresk 'argos' som betyr 'lat' – fordi det nesten ikke reagerer med noe.",facts:["Argon utgjør nesten 1 % av atmosfæren – den tredje vanligste gassen.","Det brukes i lyspærer, sveising og mellom vindusruter som isolering.","Argon-argon-datering brukes til å bestemme alderen på bergarter og fossiler."]},
{symbol:"K",name:"Kalium",no:19,year:"1807",by:"Humphry Davy",named:"Symbolet K fra latin 'kalium', fra arabisk 'al-qalyah' (planteaske).",facts:["Rent kalium eksploderer i kontakt med vann – enda mer voldsomt enn natrium!","Kalium er essensielt for nervesignaler og hjerterytme. Bananer er en kjent kilde.","Kalium-40 er naturlig radioaktivt – du sender faktisk ut stråling fra bananene du spiser (men helt ufarlig)."]},
{symbol:"Ca",name:"Kalsium",no:20,year:"1808",by:"Humphry Davy",named:"Fra latin 'calx' (kalk).",facts:["Kalsium er det femte mest tallrike grunnstoffet i jordskorpen.","Skjelettet ditt inneholder ca. 1 kg kalsium, mest som kalsiumfosfat.","Kalkstein, marmor, kritt og korallrev er alle hovedsakelig kalsiumkarbonat."]},
{symbol:"Sc",name:"Scandium",no:21,year:"1879",by:"Lars Fredrik Nilson",named:"Oppkalt etter Skandinavia (latin 'Scandia').",facts:["Scandium ble forutsagt av Mendelejev som 'eka-bor'.","Det brukes i aluminiumslegeringer for sykkelrammer og baseballbat.","Scandium er ganske vanlig i jordskorpen, men finnes aldri konsentrert nok til enkel utvinning."]},
{symbol:"Ti",name:"Titan",no:22,year:"1791",by:"William Gregor",named:"Oppkalt etter titanene i gresk mytologi.",facts:["Titan er like sterkt som stål, men 45 % lettere.","Det brukes i alt fra flyskrog til hofteproteser og tannimplantater.","Titan er ekstremt biokompatibelt – kroppen din avviser det nesten aldri."]},
{symbol:"V",name:"Vanadium",no:23,year:"1801",by:"Andrés Manuel del Río",named:"Oppkalt etter Vanadis, et norrønt navn for gudinnen Frøya.",facts:["Vanadium-stål er ekstremt sterkt og ble brukt i Henry Fords Model T.","Del Río oppdaget det først, men ble ikke trodd – det ble 'gjenoppdaget' 30 år senere.","Vanadium gir noen edelstener sine farger: blått i tanzanitt, grønt i vanadinitt."]},
{symbol:"Cr",name:"Krom",no:24,year:"1797",by:"Louis Nicolas Vauquelin",named:"Fra gresk 'chroma' (farge), fordi kromforbindelser har mange ulike farger.",facts:["Krom gir rubiner den røde fargen og smaragder den grønne – samme grunnstoff!","Forkromming gir den blanke, speilende overflaten på bildetaljer.","Rustfritt stål inneholder minst 10,5 % krom som beskytter mot rust."]},
{symbol:"Mn",name:"Mangan",no:25,year:"1774",by:"Johan Gottlieb Gahn",named:"Fra latin 'magnes' (magnet), pga. manganholdige mineraler.",facts:["Mangan brukes i stålproduksjon for å gjøre stålet hardere.","Hulemalerier fra 17 000 år siden brukte mangandioksid som svart pigment.","Fotosyntese er avhengig av et kluster med fire manganatomer."]},
{symbol:"Fe",name:"Jern",no:26,year:"Kjent siden oldtiden",by:"Ukjent",named:"Symbolet Fe fra latin 'ferrum'. 'Jern' fra norrønt.",facts:["Jordas kjerne består hovedsakelig av jern – nok til å lage tre nye måner.","Jern i hemoglobinet gir blodet ditt den røde fargen.","Det tidligste jernet mennesker brukte kom fra meteoritter – 'himmeljern'."]},
{symbol:"Co",name:"Kobolt",no:27,year:"1735",by:"Georg Brandt",named:"Fra tysk 'Kobold' (nisse/demon) – gruvearbeidere trodde ånder forgiftet malmen.",facts:["Kobolt har gitt den dype blåfargen i keramikk og glass i tusenvis av år.","Det var det første metallet oppdaget av en navngitt person.","Kobolt-60 brukes i kreftbehandling og sterilisering."]},
{symbol:"Ni",name:"Nikkel",no:28,year:"1751",by:"Axel Fredrik Cronstedt",named:"Fra tysk 'Kupfernickel' (falsk kobber).",facts:["De fleste 'nikkel'-mynter inneholder faktisk mer kobber enn nikkel.","Nikkel er viktig i rustfritt stål og oppladbare batterier.","Nikkel er en av årsakene til metallallergi – den vanligste kontaktallergien i verden."]},
{symbol:"Cu",name:"Kobber",no:29,year:"Kjent siden oldtiden",by:"Ukjent (ca. 9000 f.Kr.)",named:"Symbolet Cu fra latin 'cuprum', etter øya Kypros.",facts:["Frihetsgudinnen er dekket av ca. 80 tonn kobber som har oksidert til ikonisk grønn.","Kobber er naturlig antibakterielt – dørhåndtak i kobber dreper bakterier.","Det var det første metallet mennesker lærte å smelte, for over 10 000 år siden."]},
{symbol:"Zn",name:"Sink",no:30,year:"1746",by:"Andreas Sigismund Marggraf",named:"Trolig fra tysk 'Zinke' (tagg), etter formen på sinkkrystaller.",facts:["Sink er essensielt for immunforsvaret – derfor finnes det i halstabletter.","Det brukes til galvanisering (rustbeskyttelse) av stål.","Kroppen din inneholder ca. 2–3 gram sink."]},
{symbol:"Ga",name:"Gallium",no:31,year:"1875",by:"Paul Emile Lecoq de Boisbaudran",named:"Oppkalt etter Gallia, det latinske navnet for Frankrike.",facts:["Gallium smelter i hånden din! Smeltepunktet er bare 29,76 °C.","Det ble forutsagt av Mendelejev som 'eka-aluminium'.","Galliumarsenid brukes i LED-lys og solceller."]},
{symbol:"Ge",name:"Germanium",no:32,year:"1886",by:"Clemens Winkler",named:"Oppkalt etter Tyskland (latin 'Germania').",facts:["Germanium var nøkkelen til de første transistorene.","Forutsagt av Mendelejev som 'eka-silisium'.","Germaniumlinser brukes i infrarøde kameraer og nattsikter."]},
{symbol:"As",name:"Arsen",no:33,year:"ca. 1250",by:"Albertus Magnus",named:"Fra gresk 'arsenikon' (gult pigment), muligens fra persisk 'zarnikh'.",facts:["Arsen ble kalt 'arvepulver' fordi det ble brukt til giftmord i renessansen.","Napoleons tapeter inneholdt arsenbasert grønnfarge.","I viktoriansk tid spiste kvinner arsen for blekere hud – ekstremt farlig!"]},
{symbol:"Se",name:"Selen",no:34,year:"1817",by:"Jöns Jacob Berzelius",named:"Oppkalt etter månen (gresk 'Selene'), som motstykke til tellur.",facts:["Selen er essensielt for mennesker, men giftig i store doser.","Det leder strøm bedre når lys treffer det – brukt i solceller.","Paranøtter er den rikeste matkilden til selen."]},
{symbol:"Br",name:"Brom",no:35,year:"1826",by:"Antoine Jérôme Balard",named:"Fra gresk 'bromos' (stank) – brom lukter forferdelig.",facts:["Brom er det eneste ikke-metallet som er flytende ved romtemperatur.","Tyrian purple, oldtidens dyreste farge, ble utvunnet fra en bromforbindelse i snegler.","Bromid-salter ble brukt som beroligende middel på 1800-tallet."]},
{symbol:"Kr",name:"Krypton",no:36,year:"1898",by:"William Ramsay & Morris Travers",named:"Fra gresk 'kryptos' som betyr 'skjult'.",facts:["Ja, krypton er ekte – men nei, det svekker ikke Superman.","Fra 1960 til 1983 var meteren definert ut fra krypton-86-lys.","Krypton brukes i energieffektive vinduer og fotografiblits."]},
{symbol:"Rb",name:"Rubidium",no:37,year:"1861",by:"Robert Bunsen & Gustav Kirchhoff",named:"Fra latin 'rubidus' (mørkerød), etter de røde spektrallinjene.",facts:["Rubidium ble oppdaget med spektroskopi.","Det er så reaktivt at det spontant antennes i luft.","Rubidium brukes i atomklokker og GPS-satellitter."]},
{symbol:"Sr",name:"Strontium",no:38,year:"1790",by:"Adair Crawford",named:"Oppkalt etter landsbyen Strontian i Skottland.",facts:["Strontiumforbindelser gir den røde fargen i fyrverkeri.","Strontium-90 var en farlig komponent i nedfall fra atomprøvesprengninger.","Strontiumranelat brukes som medisin mot benskjørhet."]},
{symbol:"Y",name:"Yttrium",no:39,year:"1794",by:"Johan Gadolin",named:"Oppkalt etter Ytterby i Sverige – fire grunnstoffer ble oppdaget der!",facts:["Yttrium brukes i LED-lys, lasere og kreftbehandling.","Yttrium-barium-kobber-oksid var det første høytemperatur-supraledende materialet.","Johan Gadolin regnes som grunnleggeren av finsk kjemi."]},
{symbol:"Zr",name:"Zirkonium",no:40,year:"1789",by:"Martin Heinrich Klaproth",named:"Fra mineralet zirkon, trolig fra persisk 'zargun' (gullfarge).",facts:["Kubisk zirkonia brukes som billig diamanterstatning i smykker.","Det brukes i atomreaktorer fordi det absorberer svært lite nøytroner.","Zirkon-krystaller fra Australia er 4,4 milliarder år gamle."]},
{symbol:"Nb",name:"Niob",no:41,year:"1801",by:"Charles Hatchett",named:"Oppkalt etter Niobe i gresk mytologi, datter av Tantalos.",facts:["Niob brukes i supraledende magneter i MRI-maskiner og CERN.","Brasil produserer over 90 % av verdens niob.","Niob var kjent som 'columbium' i USA – navnestriden varte over 100 år."]},
{symbol:"Mo",name:"Molybden",no:42,year:"1781",by:"Carl Wilhelm Scheele",named:"Fra gresk 'molybdos' (bly), fordi det ble forvekslet med blymineraler.",facts:["Molybden har et av de høyeste smeltepunktene (2623 °C).","Det er et essensielt sporstoff – enzymer i kroppen trenger det.","Molybden brukes i høystyrkestål for rørledninger."]},
{symbol:"Tc",name:"Teknetium",no:43,year:"1937",by:"Carlo Perrier & Emilio Segrè",named:"Fra gresk 'technetos' (kunstig) – det første kunstig fremstilte grunnstoffet.",facts:["Teknetium brukes i medisinsk bildediagnostikk (over 10 millioner prosedyrer årlig).","Alle isotopene er radioaktive.","Mendelejev forutsa dets eksistens i 1871 som 'eka-mangan'."]},
{symbol:"Ru",name:"Ruthenium",no:44,year:"1844",by:"Karl Ernst Claus",named:"Oppkalt etter Russland (latin 'Ruthenia').",facts:["Ruthenium brukes i slitesterke elektriske kontakter og harddiskbelegg.","Det er et av de sjeldneste platinametallene.","Ruthenium-forbindelser utforskes som fremtidige solcelle-materialer."]},
{symbol:"Rh",name:"Rhodium",no:45,year:"1803",by:"William Hyde Wollaston",named:"Fra gresk 'rhodon' (rose), pga. rosarøde saltløsninger.",facts:["Rhodium er et av verdens dyreste metaller – tidvis langt dyrere enn gull.","Det brukes i katalysatorer i biler for å rense avgasser.","Rhodium er så verdifullt at tyverier av katalysatorer har blitt et problem."]},
{symbol:"Pd",name:"Palladium",no:46,year:"1803",by:"William Hyde Wollaston",named:"Oppkalt etter asteroiden Pallas, oppkalt etter gudinnen Athena Pallas.",facts:["Palladium kan absorbere 900 ganger sitt eget volum av hydrogen.","Det brukes i katalysatorer, tannfyllinger og hvitgull.","Wollaston annonserte oppdagelsen anonymt i en avisannonse!"]},
{symbol:"Ag",name:"Sølv",no:47,year:"Kjent siden oldtiden",by:"Ukjent",named:"Symbolet Ag fra latin 'argentum'. Argentina er oppkalt etter sølv!",facts:["Sølv er den beste elektriske lederen av alle grunnstoffer.","Sølv har naturlige antibakterielle egenskaper.","I gamle dager la folk sølvmynter i melken for å holde den frisk."]},
{symbol:"Cd",name:"Kadmium",no:48,year:"1817",by:"Friedrich Stromeyer",named:"Fra latin 'cadmia' (sinkmalm).",facts:["Kadmiumgult var en populær malingsfarge brukt av Monet og Van Gogh.","Det er svært giftig og strengt regulert i dag.","Japan opplevde 'itai-itai-sykdommen' på grunn av kadmiumforurensning."]},
{symbol:"In",name:"Indium",no:49,year:"1863",by:"Ferdinand Reich & H. T. Richter",named:"Oppkalt etter den indigoblå spektrallinjen.",facts:["Indium-tinn-oksid gjør berøringsskjermer mulige.","Indium er så mykt at du kan bite i det, og det knirker når det bøyes.","Reich var fargeblind og kunne ikke se spektrallinjen selv!"]},
{symbol:"Sn",name:"Tinn",no:50,year:"Kjent siden oldtiden",by:"Ukjent",named:"Symbolet Sn fra latin 'stannum'.",facts:["Tinn ble brukt i bronse for 5000 år siden.","Ved lave temperaturer kan tinn gå gjennom 'tinnpest' – det smuldrer til pulver!","Scotts Sydpol-ekspedisjon kan ha mislyktes delvis pga. tinnpest."]},
{symbol:"Sb",name:"Antimon",no:51,year:"Kjent siden oldtiden",by:"Ukjent",named:"Symbolet Sb fra latin 'stibium'. 'Antimon' kan bety 'ikke alene'.",facts:["Antimon ble brukt som øyesminke (kohl) i det gamle Egypt.","Det brukes i flammehemmende materialer.","Antimonbeger ble brukt medisinsk som 'kur'."]},
{symbol:"Te",name:"Tellur",no:52,year:"1783",by:"Franz-Joseph Müller von Reichenstein",named:"Oppkalt etter jorden (latin 'tellus').",facts:["Selv små mengder tellur gir deg intens hvitløksånde i dagevis!","Tellur er sjeldnere enn gull i jordskorpen.","Det brukes i kadmiumtellurid-solceller."]},
{symbol:"I",name:"Jod",no:53,year:"1811",by:"Bernard Courtois",named:"Fra gresk 'iodes' (fiolett), etter fargen på joddampen.",facts:["Jod sublimerer direkte til en vakker fiolett gass.","Det er essensielt for skjoldbruskkjertelen.","Courtois oppdaget jod ved en tilfeldighet – katten hans veltet syre på tangaske!"]},
{symbol:"Xe",name:"Xenon",no:54,year:"1898",by:"William Ramsay & Morris Travers",named:"Fra gresk 'xenos' (fremmed/gjest).",facts:["Xenon-lys brukes i IMAX-projektorer og kraftige frontlykter.","Xenon var den første edelgassen som dannet forbindelser (1962).","Xenon brukes som narkose – dyrt, men nesten ingen bivirkninger."]},
{symbol:"Cs",name:"Cesium",no:55,year:"1860",by:"Robert Bunsen & Gustav Kirchhoff",named:"Fra latin 'caesius' (himmelblå), etter de blå spektrallinjene.",facts:["Cesium er så reaktivt at det eksploderer i kontakt med is!","Cesium-133-atomklokker definerer sekundet.","Cesium smelter ved bare 28,4 °C."]},
{symbol:"Ba",name:"Barium",no:56,year:"1808",by:"Humphry Davy",named:"Fra gresk 'barys' (tungt).",facts:["Bariumsulfat drikkes før røntgen – uløselig og ufarlig.","Bariumnitrat gir grønn farge i fyrverkeri.","'Bologna-stein' (bariumsulfat) lyste etter oppvarming."]},
{symbol:"La",name:"Lantan",no:57,year:"1839",by:"Carl Gustaf Mosander",named:"Fra gresk 'lanthanein' (å ligge skjult).",facts:["Lantan brukes i hybridbilbatterier og studiolys.","Lantanoidene kalles 'sjeldne jordarter', men de fleste er ikke sjeldne.","Lantan brukes i kameralinser for bedre lysbrytning."]},
{symbol:"Ce",name:"Cerium",no:58,year:"1803",by:"Berzelius & Hisinger",named:"Oppkalt etter dvergplaneten Ceres.",facts:["Cerium brukes i selvrengjørende stekeovner.","Det er vanligere enn bly i jordskorpen.","Cerium-jern-legeringer gir gnisten i lightere."]},
{symbol:"Pr",name:"Praseodym",no:59,year:"1885",by:"Carl Auer von Welsbach",named:"Fra gresk 'prasios didymos' (grønn tvilling).",facts:["Praseodym gir glass vakker grønn farge.","Det brukes i flymotorlegeringer.","Det ble separert fra 'didymium'."]},
{symbol:"Nd",name:"Neodym",no:60,year:"1885",by:"Carl Auer von Welsbach",named:"Fra gresk 'neos didymos' (ny tvilling).",facts:["Neodymmagneter er de sterkeste permanentmagnetene.","De brukes i hodetelefoner, vindturbiner og elbilmotorer.","En neodymmagnet på størrelse med en mynt kan løfte over 10 kg!"]},
{symbol:"Pm",name:"Promethium",no:61,year:"1945",by:"Marinsky, Glendenin & Coryell",named:"Oppkalt etter Prometheus, som stjal ilden fra gudene.",facts:["Det eneste lantanoidet uten stabile isotoper.","Brukt i selvlysende maling og atomdrevne batterier.","Først isolert fra fissjonsprodukter i en atomreaktor."]},
{symbol:"Sm",name:"Samarium",no:62,year:"1879",by:"Lecoq de Boisbaudran",named:"Etter mineralet samarskitt, oppkalt etter gruveingeniøren Samarsky-Bykhovets.",facts:["Samarium-kobolt-magneter tåler ekstrem varme.","Samarsky-Bykhovets var den første med et grunnstoff oppkalt etter seg.","Samarium-153 brukes i kreftbehandling."]},
{symbol:"Eu",name:"Europium",no:63,year:"1901",by:"Eugène-Anatole Demarçay",named:"Oppkalt etter kontinentet Europa.",facts:["Europium gir rød farge i TV-skjermer og sikkerhet i eurosedler.","Det er det mest reaktive lantanoidet.","Europium brukes til å datere Chicxulub-nedslaget."]},
{symbol:"Gd",name:"Gadolinium",no:64,year:"1880",by:"Jean Charles Galissard de Marignac",named:"Oppkalt etter Johan Gadolin.",facts:["Gadolinium brukes som kontrastmiddel i MRI.","Det er sterkt magnetisk ved romtemperatur.","Gadolinium utforskes for miljøvennlig magnetisk kjøling."]},
{symbol:"Tb",name:"Terbium",no:65,year:"1843",by:"Carl Gustaf Mosander",named:"Oppkalt etter Ytterby i Sverige.",facts:["Terbium gir grønt lys i fluorescerende lamper.","Det brukes i Terfenol-D som endrer form i magnetfelt.","Uunnværlig i grønn teknologi."]},
{symbol:"Dy",name:"Dysprosium",no:66,year:"1886",by:"Lecoq de Boisbaudran",named:"Fra gresk 'dysprositos' (vanskelig å få tak i).",facts:["Brukes i neodymmagneter for varmebestandighet.","Kritisk for vindturbiner og elbiler.","Har en av de høyeste magnetiske styrker per atom."]},
{symbol:"Ho",name:"Holmium",no:67,year:"1878",by:"Delafontaine & Soret",named:"Oppkalt etter Stockholm (latin 'Holmia').",facts:["Holmium har den sterkeste magnetiske egenskapen av alle grunnstoffer.","Holmiumlasere brukes til å fjerne nyrestein.","Cleve oppdaget det uavhengig uten å vite om Sorets funn."]},
{symbol:"Er",name:"Erbium",no:68,year:"1843",by:"Carl Gustaf Mosander",named:"Oppkalt etter Ytterby i Sverige.",facts:["Erbium gir rosa farge i spesialglass.","Det brukes i fiberoptiske forsterkere som driver internett.","Erbium-lasere brukes i hudbehandlinger."]},
{symbol:"Tm",name:"Thulium",no:69,year:"1879",by:"Per Teodor Cleve",named:"Oppkalt etter Thule, det antikke navnet for Skandinavia.",facts:["Det nest sjeldneste lantanoidet (etter promethium).","Brukes i bærbare røntgenapparater.","Thulium-lasere brukes i militære mottiltak mot missiler."]},
